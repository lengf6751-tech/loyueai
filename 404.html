<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Not Found — Tianling Pavilion</title>
<style>
:root{--bg:#06060c;--gold:#c9a96e;--gold-light:#d4a574;--text:#e8e0d5;--text-dim:#8a8278}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;text-align:center;padding:24px}
.not-found{max-width:500px}
.not-found h1{font-size:80px;color:var(--gold);margin-bottom:8px;line-height:1}
.not-found h2{color:var(--gold-light);font-size:20px;margin-bottom:16px;font-weight:400}
.not-found p{color:var(--text-dim);font-size:14px;margin-bottom:30px;line-height:1.6}
.not-found a{display:inline-block;padding:10px 28px;background:var(--gold);color:#06060c;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;transition:opacity .2s}
.not-found a:hover{opacity:.85}
</style></head><body>
<div class="not-found">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The celestial path you seek has vanished into the void.<br>Perhaps the stars will guide you back.</p>
  <a href="/">Return to Tianling Pavilion</a>
</div>
</body></html>
